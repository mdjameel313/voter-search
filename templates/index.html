<!DOCTYPE html>
<html>
<head>
    <title>Voter Search</title>
</head>
<body>

<h1>Voter Search 🔍</h1>

<form method="POST">
    <input type="text" name="name" placeholder="Enter name" required>
    <button type="submit">Search</button>
</form>

<h2>Results:</h2>

<ul>
    {% for r in results %}
        <li>{{ r }}</li>
    {% endfor %}
</ul>

</body>
</html>
